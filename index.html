<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>code run</title>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: monospace; 
        }
        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .box { 
            width: 90%; 
            max-width: 320px; 
            border: 1px solid #333; 
            padding: 20px; 
            animation: dropIn 0.15s ease-out; 
        }
        @keyframes dropIn { 
            from { transform: translateY(-20px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        h1 { 
            font-size: 16px; 
            margin: 0 0 10px 0; 
            text-transform: lowercase; 
        }
        .status { 
            font-size: 12px; 
            color: #666; 
            margin-bottom: 20px; 
        }
        .connected { 
            color: #fff; 
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 10px; 
            background: #000; 
            color: #fff; 
            border: 1px solid #333; 
            outline: none; 
            transition: border 0.1s; 
        }
        input:focus { 
            border: 1px solid #fff; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background: #fff; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: lowercase; 
            transition: transform 0.05s, background 0.05s; 
        }
        button:active { 
            transform: scale(0.96); 
            background: #ccc; 
        }
        .setup { 
            border-top: 1px dashed #333; 
            margin-top: 15px; 
            padding-top: 15px; 
            display: none; 
        }
        .setup p { 
            font-size: 12px; 
            color: #888; 
            margin: 0 0 10px 0; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>executor</h1>
        <div id="status" class="status">loading...</div>

        <input type="text" id="msg" placeholder="message...">
        <button id="sendBtn">RUN</button>

        <div id="setup" class="setup">
            <p>no phone found.</p>
            <input type="text" id="devId" placeholder="id...">
            <button id="linkBtn">link</button>
        </div>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        let targetId = id;
        
        const status = document.getElementById("status");
        const setup = document.getElementById("setup");
        const sendBtn = document.getElementById("sendBtn");
        const msg = document.getElementById("msg");
        
        let ws = null;

        function connect(devId) {
            if (ws) ws.close();
            
            ws = new WebSocket(`wss://ntfy.sh/${devId}/ws`);
            
            ws.onopen = () => {
                status.textContent = "status: connected";
                status.className = "status connected";
            };

            ws.onclose = () => {
                status.textContent = "status: disconnected. retrying...";
                status.className = "status";
                setTimeout(() => connect(devId), 3000);
            };
        }

        if (targetId) {
            connect(targetId);
        } else {
            setup.style.display = "block";
            status.textContent = "status: waiting";
        }

        document.getElementById("linkBtn").addEventListener("click", () => {
            const val = document.getElementById("devId").value.trim();
            if (val) {
                targetId = val;
                connect(targetId);
                setup.style.display = "none";
            }
        });

        sendBtn.addEventListener("click", () => {
            const text = msg.value.trim();
            if (!targetId) return;
            
            if (text) {
                fetch(`https://ntfy.sh/${targetId}`, {
                    method: 'POST',
                    body: text
                }).then(() => {
                    status.textContent = "sent.";
                    setTimeout(() => {
                        status.textContent = "status: connected";
                    }, 1000);
                    msg.value = ""; // Auto-clear the text box after sending
                }).catch(() => {
                    status.textContent = "error.";
                });
            }
        });
    </script>
</body>
</html>
