<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iOS Tweak Control Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 40px 20px; }
        .container { max-width: 400px; margin: 0 auto; background: #1c1c1e; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 5px; font-size: 24px; }
        .status { font-size: 14px; margin-bottom: 25px; color: #8e8e93; word-wrap: break-word; }
        .status.connected { color: #30d158; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #3a3a3c; background: #2c2c2e; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #0a84ff; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; }
        button:active { background: #0056b3; }
        .setup-box { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #ff9500; }
        .setup-box p { font-size: 13px; color: #ff9500; margin: 0 0 12px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tweak Controller</h1>
        <div id="status" class="status">Initializing...</div>
        
        <!-- Shown only if the page is opened without a device ID in the URL -->
        <div id="setup-area" class="setup-box" style="display:none;">
            <p>No phone linked. Open this page on your phone first to pair, or enter your Device ID manually below:</p>
            <input type="text" id="deviceIdInput" placeholder="Enter Device ID...">
            <button id="connectBtn" style="background: #ff9500;">Link & Connect</button>
        </div>

        <input type="text" id="msgInput" placeholder="Type custom alert message..." value="Hello from Safari!">
        <button id="sendBtn">Run Tweak Event</button>
    </div>

    <script>
        // Extract the unique device ID from the URL search query (e.g. ?id=UUID)
        const urlParams = new URLSearchParams(window.location.search);
        let channelId = urlParams.get('id');
        
        const setupArea = document.getElementById("setup-area");
        const deviceIdInput = document.getElementById("deviceIdInput");
        const connectBtn = document.getElementById("connectBtn");
        const statusDiv = document.getElementById("status");
        const sendBtn = document.getElementById("sendBtn");
        const msgInput = document.getElementById("msgInput");
        
        let socket = null;

        function connectToWebSocket(id) {
            if (socket) {
                socket.close();
            }
            // Uses the device UUID as a completely isolated room
            const wsUrl = `wss://demo.piesocket.com/v3/${id}?api_key=VCbEZAFZmbes97v2A51T9scMy9KiwT5v2eIYFrba`;
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                statusDiv.textContent = `Connected to Device ID: ${id}`;
                statusDiv.className = "status connected";
            };

            socket.onclose = () => {
                statusDiv.textContent = "Disconnected from room.";
                statusDiv.className = "status";
            };
        }

        // Auto-connect if URL has the 'id' parameter from the tweak launch
        if (channelId) {
            connectToWebSocket(channelId);
        } else {
            setupArea.style.display = "block";
            statusDiv.textContent = "Awaiting pairing...";
        }

        // Fallback for manual computer web pairing
        connectBtn.addEventListener("click", () => {
            const inputVal = deviceIdInput.value.trim();
            if (inputVal) {
                channelId = inputVal;
                connectToWebSocket(channelId);
                setupArea.style.display = "none";
            }
        });

        sendBtn.addEventListener("click", () => {
            const message = msgInput.value.trim();
            if (!channelId) {
                alert("Please pair a Device ID first!");
                return;
            }
            if (message && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(message);
                statusDiv.textContent = "Event Sent!";
                setTimeout(() => {
                    statusDiv.textContent = `Connected to Device ID: ${channelId}`;
                }, 2000);
            }
        });
    </script>
</body>
</html>
